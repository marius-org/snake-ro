apiVersion: apps/v1
kind: Deployment
metadata:
  name: snake-ro
  namespace: snake-ro
spec:
  replicas: 2
  selector:
    matchLabels:
      app: snake-ro
  template:
    metadata:
      labels:
        app: snake-ro
    spec:
      containers:
        - name: snake-ro
          image: mariuseu/snake-ro:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DATABASE_URL
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: snake-ro-service
  namespace: snake-ro
spec:
  selector:
    app: snake-ro
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: snake-ro-ingress
  namespace: snake-ro
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: snake.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: snake-ro-service
                port:
                  number: 80
