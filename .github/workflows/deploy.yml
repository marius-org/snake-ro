name: Deploy Snake-RO

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: control-node
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            mariuseu/snake-ro:latest
            mariuseu/snake-ro:${{ github.run_number }}

      - name: Deploy to k3s
        run: |
          kubectl set image deployment/snake-ro \
            snake-ro=mariuseu/snake-ro:${{ github.run_number }} \
            -n snake-ro
          kubectl rollout status deployment/snake-ro \
            -n snake-ro --timeout=120s
