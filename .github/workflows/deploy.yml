name: Deploy Snake-RO

on:
  push:
    branches: [main]
    paths-ignore:
      - 'k3s/**'
      - 'README.md'
      - '*.md'

jobs:
  build-and-push:
    runs-on: control-node
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            mariuseu/snake-ro:latest
            mariuseu/snake-ro:${{ github.run_number }}

      - name: Update image tag in manifest
        run: |
          sed -i "s|mariuseu/snake-ro:.*|mariuseu/snake-ro:${{ github.run_number }}|g" \
            k3s/deployment.yaml

      - name: Commit and push updated manifest
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add k3s/deployment.yaml
          git commit -m "Update snake-ro image to ${{ github.run_number }} [skip ci]"
          git push